name: Vinyl Scout
on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Nombre de disques à analyser (défaut: 50 = ~1 250 crédits LBC)'
        required: false
        default: '50'
      test_mode:
        description: 'Mode test (5 disques seulement)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run Vinyl Scout
        env:
          SCRAPEOPS_KEY: ${{ secrets.SCRAPEOPS_KEY }}
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '50' }}
        run: python scout.py
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ALERTES.md ALERTES.html vinyl_db.json scout_offset.json scout_blacklist.json || true
          git diff --staged --quiet || git commit -m "Scout run $(date +'%Y-%m-%d %H:%M')"
          git push
