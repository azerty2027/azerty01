name: Vinyl Scout

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scout
        run: python scout.py

      - name: Save results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Scout update"
          push_options: '--force'
