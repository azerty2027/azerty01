name: Vinyl Scout
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml
      - name: Run scout
        run: python scout.py
        env:
          TEST_MODE: "false"
          SCRAPEOPS_KEY: ${{ secrets.SCRAPEOPS_KEY }}
      - name: Save results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ALERTES.md vinyl_db.json
          git diff --staged --quiet || git commit -m "Scout update"
          git push origin main --force
