name: Vinyl Scout
on:
  # schedule:
  #   - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Nombre de disques à analyser (défaut: 50 = ~1 250 crédits LBC)'
        required: false
        default: '50'
      test_mode:
        description: 'Mode test (5 disques seulement)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run Vinyl Scout
        env:
          SCRAPEOPS_KEY: ${{ secrets.SCRAPEOPS_KEY }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '50' }}
        run: python scout.py
      - name: Commit rapport
        run: |
          git config user.name "Vinyl Scout Bot"
          git config user.email "scout@bot.local"
          git add ALERTES.html vinyl_db.json scout_offset.json scout_blacklist.json || true
          git diff --staged --quiet || git commit -m "Scout $(date '+%d/%m/%Y %H:%M') — batch ${{ github.event.inputs.batch_size || '50' }}"
          git push
